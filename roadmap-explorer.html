<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Transformation Roadmap — Layout Explorer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=JetBrains+Mono:wght@400;500;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#111; color:#ccc; font-family:system-ui,-apple-system,sans-serif; font-size:13px; display:flex; height:100vh; overflow:hidden; }

  #controls { width:260px; min-width:260px; background:#0d0d0d; border-right:1px solid #1a1a1a; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:14px; }
  #controls h1 { font-size:13px; font-weight:700; color:#f97316; letter-spacing:0.05em; text-transform:uppercase; font-family:'Space Grotesk',sans-serif; }
  .subtitle { font-size:11px; color:#555; margin-bottom:4px; }
  .ctrl-group { border:1px solid #1a1a1a; border-radius:10px; padding:10px; background:#0a0a0a; }
  .ctrl-group h3 { font-size:10px; font-weight:600; color:#777; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:8px; }
  .ctrl-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .ctrl-row:last-child { margin-bottom:0; }
  .ctrl-row label { font-size:11px; color:#999; }
  .ctrl-row select { background:#151515; color:#ccc; border:1px solid #222; border-radius:5px; padding:2px 5px; font-size:11px; }
  .ctrl-row input[type="range"] { width:90px; accent-color:#f97316; }
  .ctrl-row .val { font-family:'JetBrains Mono',monospace; font-size:10px; color:#f97316; min-width:28px; text-align:right; }

  .presets { display:flex; gap:5px; flex-wrap:wrap; }
  .preset-btn { flex:1; min-width:70px; padding:7px 4px; border-radius:7px; border:1px solid #222; background:#111; color:#aaa; font-size:10px; font-weight:600; cursor:pointer; text-align:center; transition:all 0.15s; font-family:'Space Grotesk',sans-serif; }
  .preset-btn:hover { border-color:#f97316; color:#f97316; }
  .preset-btn.active { background:rgba(249,115,22,0.1); border-color:#f97316; color:#f97316; }

  .toggle-row { display:flex; align-items:center; gap:7px; margin-bottom:6px; }
  .toggle-row:last-child { margin-bottom:0; }
  .toggle { width:32px; height:18px; border-radius:9px; background:#222; cursor:pointer; position:relative; transition:background 0.2s; flex-shrink:0; }
  .toggle.on { background:#f97316; }
  .toggle::after { content:''; position:absolute; top:2px; left:2px; width:14px; height:14px; border-radius:50%; background:#fff; transition:transform 0.2s; }
  .toggle.on::after { transform:translateX(14px); }
  .toggle-row label { font-size:11px; color:#999; cursor:pointer; }

  #preview-wrap { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  #preview { flex:1; overflow-y:auto; padding:28px; background:#0a0a0f; }
  #prompt-wrap { border-top:1px solid #1a1a1a; background:#0d0d0d; padding:10px 14px; max-height:160px; overflow-y:auto; }
  #prompt-wrap .prompt-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  #prompt-wrap .prompt-header span { font-size:10px; color:#555; text-transform:uppercase; letter-spacing:0.08em; }
  #copy-btn { padding:3px 10px; border-radius:5px; border:1px solid #333; background:#181818; color:#ccc; font-size:10px; cursor:pointer; transition:all 0.15s; }
  #copy-btn:hover { border-color:#f97316; color:#f97316; }
  #prompt-text { font-family:'JetBrains Mono',monospace; font-size:10px; color:#888; line-height:1.6; white-space:pre-wrap; }
</style>
</head>
<body>

<div id="controls">
  <div>
    <h1>Roadmap Explorer</h1>
    <div class="subtitle">AI Transformation — 14-60-Q3-Q4 layout options</div>
  </div>

  <div class="ctrl-group">
    <h3>Preset</h3>
    <div class="presets">
      <button class="preset-btn active" onclick="applyPreset('A')">A · Gantt</button>
      <button class="preset-btn" onclick="applyPreset('B')">B · Cards</button>
      <button class="preset-btn" onclick="applyPreset('C')">C · Journey</button>
    </div>
  </div>

  <div class="ctrl-group">
    <h3>Layout</h3>
    <div class="ctrl-row">
      <label>Timeline style</label>
      <select id="ctrl-layout" onchange="state.layout=this.value;updateAll()">
        <option value="gantt">Gantt swim lanes</option>
        <option value="cards">Stacked cards</option>
        <option value="journey">Journey map</option>
      </select>
    </div>
    <div class="ctrl-row">
      <label>Card radius</label>
      <input type="range" id="ctrl-radius" min="8" max="28" value="16" oninput="state.radius=+this.value;updateAll()">
      <span class="val" id="val-radius">16</span>
    </div>
    <div class="ctrl-row">
      <label>Phase spacing</label>
      <input type="range" id="ctrl-gap" min="8" max="32" value="16" oninput="state.gap=+this.value;updateAll()">
      <span class="val" id="val-gap">16</span>
    </div>
  </div>

  <div class="ctrl-group">
    <h3>Content</h3>
    <div class="toggle-row">
      <div class="toggle on" id="ctrl-showImpact" onclick="toggleCtrl('showImpact')"></div>
      <label onclick="toggleCtrl('showImpact')">Show expected impact</label>
    </div>
    <div class="toggle-row">
      <div class="toggle on" id="ctrl-showDeliverables" onclick="toggleCtrl('showDeliverables')"></div>
      <label onclick="toggleCtrl('showDeliverables')">Show deliverables</label>
    </div>
    <div class="toggle-row">
      <div class="toggle on" id="ctrl-showMilestones" onclick="toggleCtrl('showMilestones')"></div>
      <label onclick="toggleCtrl('showMilestones')">Show milestones</label>
    </div>
    <div class="toggle-row">
      <div class="toggle on" id="ctrl-showCTA" onclick="toggleCtrl('showCTA')"></div>
      <label onclick="toggleCtrl('showCTA')">Show CTA banner</label>
    </div>
    <div class="toggle-row">
      <div class="toggle" id="ctrl-showWeeks" onclick="toggleCtrl('showWeeks')"></div>
      <label onclick="toggleCtrl('showWeeks')">Show week markers</label>
    </div>
  </div>

  <div class="ctrl-group">
    <h3>Phase Colors</h3>
    <div class="ctrl-row">
      <label>Scheme</label>
      <select id="ctrl-colorScheme" onchange="state.colorScheme=this.value;updateAll()">
        <option value="orange-gradient">Orange gradient</option>
        <option value="domain-colors">Domain colors</option>
        <option value="status-colors">Status (red→green)</option>
        <option value="monochrome">Monochrome</option>
      </select>
    </div>
  </div>

  <div class="ctrl-group">
    <h3>Header</h3>
    <div class="ctrl-row">
      <label>Title style</label>
      <select id="ctrl-headerStyle" onchange="state.headerStyle=this.value;updateAll()">
        <option value="hero">Hero banner</option>
        <option value="compact">Compact inline</option>
        <option value="hidden">Hidden</option>
      </select>
    </div>
  </div>
</div>

<div id="preview-wrap">
  <div id="preview"></div>
  <div id="prompt-wrap">
    <div class="prompt-header">
      <span>Generated Prompt</span>
      <button id="copy-btn" onclick="copyPrompt()">Copy</button>
    </div>
    <div id="prompt-text"></div>
  </div>
</div>

<script>
const CTA_URL = 'https://calendar.google.com/calendar/appointments/schedules/AcZssZ3i1Ln5x0OopEqxxTQzfw6fWVy-M_-eAIfG0K-4pCOsATXssPqCNjJFuYl9uvKrp9ykG8kDEf61';

const PHASE_COLORS = {
  'orange-gradient': ['#f97316','#fb923c','#fbbf24','#34d399'],
  'domain-colors': ['#818cf8','#60a5fa','#c084fc','#4ade80'],
  'status-colors': ['#ef4444','#f97316','#fbbf24','#4ade80'],
  'monochrome': ['#666','#888','#aaa','#ccc'],
};

const PHASES = [
  {
    id:'p1', label:'Phase 1', duration:'Days 1–14', title:'Full AI Diagnostics',
    tagline:'Map every opportunity before making a single change',
    color:'#f97316',
    milestones:[
      {text:'Leadership interviews (CEO, CTO, VP Eng, VP Sales, VP Marketing)', week:'W1'},
      {text:'Process mapping across all functions — shadow real workflows', week:'W1'},
      {text:'Current state scoring — AI readiness per domain (Organization, Data, Engineering, Sales, Support, Marketing, Product)', week:'W1-2'},
      {text:'Opportunity sizing — $ estimates per initiative with headcount-adjusted ROI', week:'W2'},
      {text:'Build full transformation plan with 100+ initiatives and Chief AI Officer Agent', week:'W2'},
    ],
    deliverables:['AI Readiness Dashboard (per-domain scores)', 'Initiative Map (100+ opportunities ranked by impact × effort)', 'ROI Model ($2.4M–$5.2M opportunity sizing)', 'Prioritized 90-day implementation plan'],
    impact:'Baseline established. Leadership aligned on opportunity size. Clear priority stack for implementation.',
  },
  {
    id:'p2', label:'Phase 2', duration:'Days 15–60', title:'Launch & Quick Wins',
    tagline:'Stand up the AI Office, ship the first wins, build momentum',
    color:'#fb923c',
    milestones:[
      {text:'Establish AI Office — appoint CAIO or transformation lead', week:'W3'},
      {text:'Launch Change Management (McKinsey 4 quadrants): Role Models, Skills Development, Understanding & Conviction, Formal Mechanisms', week:'W3-4'},
      {text:'Deploy enterprise AI access for 100% of employees', week:'W3', dyn:true},
      {text:'Kick-off pilot: AI-first PR review pipeline — target <6h cycle time', week:'W4-5', dyn:true},
      {text:'Create SKILLS.md / AI playbook per function', week:'W5-6', dyn:true},
      {text:'First pilot results — measure against diagnostic baselines', week:'W7-8'},
    ],
    deliverables:['AI Office charter & governance', 'Change Management framework deployed', 'Enterprise AI tools rolled out', '3–5 pilot projects launched', 'Per-function AI playbooks (SKILLS.md)'],
    impact:'AI Champions network active. First measurable wins (30–50% time savings on pilot workflows). Organization-wide AI access.',
  },
  {
    id:'p3', label:'Phase 3', duration:'Q3 2026', title:'Scale & Automate',
    tagline:'Expand what works, automate what repeats, measure everything',
    color:'#fbbf24',
    milestones:[
      {text:'Expand successful pilots to full departments', week:'Month 3-4'},
      {text:'Deploy always-on agents for support triage — target 75% auto-resolution', week:'Month 3', dyn:true},
      {text:'Automate content pipeline end-to-end: research → brief → draft → review → publish with zero human touch', week:'Month 4', dyn:true},
      {text:'AI-assisted sales: autonomous follow-ups, proposal generation, call coaching', week:'Month 4', dyn:true},
      {text:'Build company-wide knowledge layer — every doc, every process, every decision queryable by AI', week:'Month 4-5', dyn:true},
      {text:'Mid-point ROI review vs. diagnostic baselines', week:'Month 5'},
    ],
    deliverables:['Always-on agents deployed (support, engineering, content)', 'Automated content & sales pipelines', 'Company knowledge layer operational', 'ROI report: actual savings vs. projected'],
    impact:'50–70% of identified opportunities captured. Support ticket automation >50%. Engineering parallel sessions 5–10x. Content velocity 3–5x.',
  },
  {
    id:'p4', label:'Phase 4', duration:'Q4 2026', title:'AI-Native Organization',
    tagline:'Not using AI — being AI. Every function, every workflow, every decision.',
    color:'#34d399',
    milestones:[
      {text:'Orchestrate Orchestrators — meta-agents managing agent fleets across functions, self-healing pipelines, autonomous prioritization', week:'Month 7', dyn:true},
      {text:'Long-Term Org Memory — every workflow, decision, and outcome feeds a compounding knowledge graph that makes every future AI action smarter', week:'Month 7-8', dyn:true},
      {text:'Agent-to-Employee ratio >2:1 — each person has 2+ dedicated AI agents handling research, drafting, monitoring, and execution', week:'Month 8', dyn:true},
      {text:'AI-native hiring & onboarding — every role includes agent setup on Day 1, every job description requires AI fluency', week:'Month 8', dyn:true},
      {text:'End-of-year executive review: full ROI vs. diagnostic baseline, 2027 AI roadmap', week:'Month 9'},
    ],
    deliverables:['Orchestrator-of-orchestrators deployed', 'Org Memory knowledge graph live', 'Agent-to-Employee ratio >2:1 achieved', 'AI-native HR processes', '2027 AI roadmap'],
    impact:'AI is the organization. 80%+ opportunity captured. 3–5x output without headcount growth. Every employee has an AI co-pilot. Competitive moat is compounding.',
  },
];

const PRESETS = {
  A: { layout:'gantt', radius:16, gap:16, showImpact:true, showDeliverables:true, showMilestones:true, showCTA:true, showWeeks:false, colorScheme:'orange-gradient', headerStyle:'hero' },
  B: { layout:'cards', radius:20, gap:20, showImpact:true, showDeliverables:true, showMilestones:true, showCTA:true, showWeeks:false, colorScheme:'orange-gradient', headerStyle:'hero' },
  C: { layout:'journey', radius:16, gap:16, showImpact:true, showDeliverables:false, showMilestones:true, showCTA:true, showWeeks:true, colorScheme:'status-colors', headerStyle:'compact' },
};

let state = {...PRESETS.A};

function toggleCtrl(key) { state[key]=!state[key]; document.getElementById('ctrl-'+key).classList.toggle('on',state[key]); updateAll(); }

function syncControls() {
  document.getElementById('ctrl-layout').value = state.layout;
  document.getElementById('ctrl-radius').value = state.radius;
  document.getElementById('val-radius').textContent = state.radius;
  document.getElementById('ctrl-gap').value = state.gap;
  document.getElementById('val-gap').textContent = state.gap;
  ['showImpact','showDeliverables','showMilestones','showCTA','showWeeks'].forEach(k => {
    document.getElementById('ctrl-'+k).classList.toggle('on', state[k]);
  });
  document.getElementById('ctrl-colorScheme').value = state.colorScheme;
  document.getElementById('ctrl-headerStyle').value = state.headerStyle;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  const idx = {A:0,B:1,C:2}[state.preset];
  if (idx !== undefined) document.querySelectorAll('.preset-btn')[idx]?.classList.add('active');
}

function applyPreset(key) { state = {...PRESETS[key], preset:key}; syncControls(); updateAll(); }

function glass(rad) { return `background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.05);border-radius:${rad||state.radius}px;`; }
function getColors() { return PHASE_COLORS[state.colorScheme] || PHASE_COLORS['orange-gradient']; }

// ── Render ──
function renderPreview() {
  const el = document.getElementById('preview');
  const colors = getColors();
  let h = '<div style="max-width:1100px;margin:0 auto;">';

  // ── HEADER ──
  if (state.headerStyle === 'hero') {
    h += `<div style="text-align:center;padding:40px 0 36px;">`;
    h += `<p style="font-size:10px;text-transform:uppercase;letter-spacing:0.18em;color:#555;font-weight:600;margin-bottom:16px;font-family:'Space Grotesk',sans-serif;">AI Transformation Roadmap</p>`;
    h += `<h1 style="font-family:'Space Grotesk',sans-serif;font-size:36px;font-weight:700;color:#fff;letter-spacing:-0.03em;line-height:1.15;margin-bottom:12px;">From Diagnostic to<br><span style="background:linear-gradient(135deg,#fb923c,#f97316,#ea580c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">AI-Native Organization</span></h1>`;
    h += `<p style="font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:#666;max-width:520px;margin:0 auto;line-height:1.6;">A structured 9-month journey: diagnose, launch, scale, optimize. Every phase builds on the last.</p>`;
    h += `</div>`;
    h += `<div style="height:1px;max-width:900px;margin:0 auto 32px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);"></div>`;
  } else if (state.headerStyle === 'compact') {
    h += `<div style="display:flex;align-items:center;gap:16px;padding:20px 0 28px;">`;
    h += `<div style="flex:1;"><p style="font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:#fff;letter-spacing:-0.02em;">AI Transformation Roadmap</p>`;
    h += `<p style="font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;color:#555;margin-top:4px;">14 days → 60 days → Q3 → Q4 2026</p></div>`;
    h += `<div style="display:flex;gap:6px;">`;
    PHASES.forEach((p,i) => {
      h += `<div style="display:flex;align-items:center;gap:4px;padding:4px 10px;${glass(8)}">`;
      h += `<span style="width:6px;height:6px;border-radius:50%;background:${colors[i]};"></span>`;
      h += `<span style="font-size:10px;font-weight:600;color:${colors[i]};font-family:'Space Grotesk',sans-serif;">${p.duration}</span>`;
      h += `</div>`;
    });
    h += `</div></div>`;
  }

  // ── PHASE TIMELINE BAR (all layouts) ──
  h += `<div style="display:flex;gap:3px;margin-bottom:${state.gap+8}px;border-radius:8px;overflow:hidden;height:6px;">`;
  const widths = [14,46,25,15]; // rough proportional widths for 14d, 46d, ~90d, ~90d
  PHASES.forEach((p,i) => {
    h += `<div style="flex:${widths[i]};background:${colors[i]};opacity:0.6;"></div>`;
  });
  h += `</div>`;

  // ── LAYOUT-SPECIFIC RENDERING ──
  if (state.layout === 'gantt') {
    h += renderGantt(colors);
  } else if (state.layout === 'cards') {
    h += renderCards(colors);
  } else if (state.layout === 'journey') {
    h += renderJourney(colors);
  }

  // ── CTA ──
  if (state.showCTA) {
    h += `<div style="text-align:center;padding:48px 32px;${glass(24)}margin-top:${state.gap+12}px;position:relative;overflow:hidden;">`;
    h += `<div style="position:absolute;top:0;left:50%;transform:translateX(-50%);width:400px;height:200px;background:radial-gradient(ellipse,rgba(249,115,22,0.08),transparent 70%);pointer-events:none;"></div>`;
    h += `<div style="position:relative;">`;
    h += `<h3 style="font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:#fff;letter-spacing:-0.02em;margin-bottom:8px;">Ready to Start Your Transformation?</h3>`;
    h += `<p style="font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;color:#555;max-width:460px;margin:0 auto 24px;line-height:1.6;">Book a free diagnostic call. We'll map your AI opportunity in 14 days — 100+ initiatives, dollar estimates, and a prioritized transformation plan.</p>`;
    h += `<a href="${CTA_URL}" target="_blank" rel="noreferrer" style="display:inline-flex;align-items:center;gap:8px;padding:14px 32px;border-radius:16px;background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;font-weight:600;font-size:14px;text-decoration:none;font-family:'Space Grotesk',sans-serif;transition:all 0.2s;">`;
    h += `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`;
    h += `Discuss Your Roadmap with Codos</a>`;
    h += `</div></div>`;
  }

  h += '</div>';
  el.innerHTML = h;
}

// ── GANTT LAYOUT ──
function renderGantt(colors) {
  let h = '';
  PHASES.forEach((phase, pi) => {
    const col = colors[pi];
    h += `<div style="display:flex;gap:0;margin-bottom:${state.gap}px;${glass()}overflow:hidden;">`;

    // Left: phase label column (fixed width)
    h += `<div style="width:340px;min-width:340px;padding:24px;border-right:1px solid rgba(255,255,255,0.04);position:relative;">`;
    h += `<div style="position:absolute;top:0;left:0;bottom:0;width:3px;background:${col};"></div>`;
    h += `<p style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:${col};letter-spacing:0.06em;text-transform:uppercase;margin-bottom:4px;">${phase.label}</p>`;
    h += `<p style="font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:#fff;letter-spacing:-0.02em;margin-bottom:4px;">${phase.title}</p>`;
    h += `<p style="font-family:'JetBrains Mono',monospace;font-size:12px;color:${col};opacity:0.7;margin-bottom:10px;">${phase.duration}</p>`;
    h += `<p style="font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;color:#555;line-height:1.5;">${phase.tagline}</p>`;
    if (state.showImpact) {
      h += `<div style="margin-top:16px;padding:14px 16px;border-radius:12px;border-left:3px solid ${col};background:linear-gradient(135deg,${col}08,${col}03);position:relative;overflow:hidden;">`;
      h += `<div style="position:absolute;top:-10px;right:-10px;width:60px;height:60px;background:radial-gradient(circle,${col}12,transparent 70%);pointer-events:none;"></div>`;
      h += `<p style="font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:${col};font-weight:700;margin-bottom:6px;font-family:'Space Grotesk',sans-serif;display:flex;align-items:center;gap:6px;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="${col}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Expected Impact</p>`;
      h += `<p style="font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;color:rgba(255,255,255,0.8);line-height:1.55;">${phase.impact}</p>`;
      h += `</div>`;
    }
    h += `</div>`;

    // Right: milestones + deliverables
    h += `<div style="flex:1;padding:24px;">`;
    if (state.showMilestones) {
      h += `<p style="font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:#555;font-weight:600;margin-bottom:10px;font-family:'Space Grotesk',sans-serif;">Key Milestones</p>`;
      h += `<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:${state.showDeliverables?'18':'0'}px;">`;
      phase.milestones.forEach((m,mi) => {
        h += `<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.03);">`;
        if (state.showWeeks) {
          h += `<span style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:${col};background:${col}15;padding:2px 6px;border-radius:4px;white-space:nowrap;margin-top:2px;">${m.week}</span>`;
        } else {
          h += `<span style="width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:7px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:${col};background:${col}15;flex-shrink:0;">${mi+1}</span>`;
        }
        h += `<div style="flex:1;">`;
        h += `<p style="font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:rgba(255,255,255,0.7);line-height:1.5;">${m.text}</p>`;
        if (m.dyn) h += `<span style="display:inline-block;margin-top:4px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;color:${col};opacity:0.5;letter-spacing:0.04em;">from your diagnostic</span>`;
        h += `</div>`;
        h += `</div>`;
      });
      h += `</div>`;
    }
    if (state.showDeliverables) {
      h += `<p style="font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:#555;font-weight:600;margin-bottom:8px;font-family:'Space Grotesk',sans-serif;">Deliverables</p>`;
      h += `<div style="display:flex;flex-wrap:wrap;gap:6px;">`;
      phase.deliverables.forEach(d => {
        h += `<span style="font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;color:${col};background:${col}10;border:1px solid ${col}25;padding:5px 12px;border-radius:8px;">${d}</span>`;
      });
      h += `</div>`;
    }
    h += `</div></div>`;
  });
  return h;
}

// ── STACKED CARDS LAYOUT ──
function renderCards(colors) {
  let h = '';
  PHASES.forEach((phase, pi) => {
    const col = colors[pi];
    h += `<div style="${glass()}overflow:hidden;margin-bottom:${state.gap}px;">`;
    h += `<div style="height:3px;background:linear-gradient(90deg,${col},${col}40,transparent);"></div>`;
    h += `<div style="padding:28px 32px;">`;

    // Header row
    h += `<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;">`;
    h += `<div>`;
    h += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">`;
    h += `<span style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:${col};background:${col}15;padding:4px 10px;border-radius:6px;letter-spacing:0.05em;">${phase.label.toUpperCase()}</span>`;
    h += `<span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:${col};opacity:0.6;">${phase.duration}</span>`;
    h += `</div>`;
    h += `<h3 style="font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;color:#fff;letter-spacing:-0.02em;">${phase.title}</h3>`;
    h += `<p style="font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;color:#555;margin-top:4px;">${phase.tagline}</p>`;
    h += `</div>`;
    if (state.showImpact) {
      h += `<div style="max-width:280px;padding:14px 18px;${glass(12)}">`;
      h += `<p style="font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:#444;font-weight:600;margin-bottom:6px;font-family:'Space Grotesk',sans-serif;">Expected Impact</p>`;
      h += `<p style="font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;color:${col};opacity:0.85;line-height:1.55;">${phase.impact}</p>`;
      h += `</div>`;
    }
    h += `</div>`;

    // Milestones grid
    if (state.showMilestones) {
      h += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:${state.showDeliverables?'20':'0'}px;">`;
      phase.milestones.forEach((m,mi) => {
        h += `<div style="padding:12px 14px;border-radius:12px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);">`;
        h += `<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">`;
        h += `<span style="width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:7px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:${col};background:${col}15;">${mi+1}</span>`;
        if (state.showWeeks) h += `<span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#555;">${m.week}</span>`;
        h += `</div>`;
        h += `<p style="font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:rgba(255,255,255,0.7);line-height:1.5;">${m.text}</p>`;
        if (m.dyn) h += `<span style="display:inline-block;margin-top:3px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;color:${col};opacity:0.5;">from your diagnostic</span>`;
        h += `</div>`;
      });
      h += `</div>`;
    }

    // Deliverables
    if (state.showDeliverables) {
      h += `<div style="padding-top:16px;border-top:1px solid rgba(255,255,255,0.04);">`;
      h += `<p style="font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:#555;font-weight:600;margin-bottom:8px;font-family:'Space Grotesk',sans-serif;">Deliverables</p>`;
      h += `<div style="display:flex;flex-wrap:wrap;gap:6px;">`;
      phase.deliverables.forEach(d => {
        h += `<span style="font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;color:${col};background:${col}10;border:1px solid ${col}25;padding:5px 12px;border-radius:8px;">${d}</span>`;
      });
      h += `</div></div>`;
    }

    h += `</div></div>`;
  });
  return h;
}

// ── JOURNEY MAP LAYOUT ──
function renderJourney(colors) {
  let h = '';
  h += `<div style="position:relative;padding-left:40px;">`;
  // Vertical line
  h += `<div style="position:absolute;left:15px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,${colors[0]},${colors[1]},${colors[2]},${colors[3]});opacity:0.3;"></div>`;

  PHASES.forEach((phase, pi) => {
    const col = colors[pi];
    const isLast = pi === PHASES.length - 1;

    // Node
    h += `<div style="position:relative;margin-bottom:${isLast?0:state.gap+16}px;">`;
    // Circle on timeline
    h += `<div style="position:absolute;left:-33px;top:2px;width:18px;height:18px;border-radius:50%;background:${col};border:3px solid #0a0a0f;box-shadow:0 0 12px ${col}40;"></div>`;

    // Content card
    h += `<div style="${glass()}overflow:hidden;padding:24px 28px;">`;
    h += `<div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,${col}60,transparent);"></div>`;

    // Header
    h += `<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">`;
    h += `<span style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:${col};background:${col}15;padding:4px 10px;border-radius:6px;">${phase.label.toUpperCase()}</span>`;
    h += `<span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:${col};opacity:0.6;">${phase.duration}</span>`;
    h += `</div>`;
    h += `<h3 style="font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:#fff;letter-spacing:-0.02em;margin-bottom:4px;">${phase.title}</h3>`;
    h += `<p style="font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;color:#555;margin-bottom:16px;">${phase.tagline}</p>`;

    // Milestones as connected nodes
    if (state.showMilestones) {
      h += `<div style="display:flex;flex-direction:column;gap:4px;margin-bottom:${state.showImpact||state.showDeliverables?'16':'0'}px;">`;
      phase.milestones.forEach((m,mi) => {
        h += `<div style="display:flex;align-items:flex-start;gap:10px;padding:8px 10px;">`;
        h += `<div style="margin-top:4px;width:8px;height:8px;border-radius:50%;background:${col}40;border:2px solid ${col};flex-shrink:0;"></div>`;
        h += `<div style="flex:1;">`;
        h += `<p style="font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;color:rgba(255,255,255,0.7);line-height:1.5;">${m.text}</p>`;
        if (m.dyn) h += `<span style="display:inline-block;margin-top:3px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;color:${col};opacity:0.5;">from your diagnostic</span>`;
        if (state.showWeeks) h += `<p style="font-family:'JetBrains Mono',monospace;font-size:10px;color:#444;margin-top:2px;">${m.week}</p>`;
        h += `</div></div>`;
        if (mi < phase.milestones.length - 1) {
          h += `<div style="margin-left:13px;width:1px;height:4px;background:${col}20;"></div>`;
        }
      });
      h += `</div>`;
    }

    // Impact
    if (state.showImpact) {
      h += `<div style="padding:12px 16px;${glass(12)}margin-bottom:${state.showDeliverables?'12':'0'}px;">`;
      h += `<p style="font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:#444;font-weight:600;margin-bottom:4px;font-family:'Space Grotesk',sans-serif;">Expected Impact</p>`;
      h += `<p style="font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;color:${col};opacity:0.85;line-height:1.55;">${phase.impact}</p>`;
      h += `</div>`;
    }

    // Deliverables
    if (state.showDeliverables) {
      h += `<div style="display:flex;flex-wrap:wrap;gap:6px;">`;
      phase.deliverables.forEach(d => {
        h += `<span style="font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;color:${col};background:${col}10;border:1px solid ${col}25;padding:5px 12px;border-radius:8px;">${d}</span>`;
      });
      h += `</div>`;
    }

    h += `</div></div>`;
  });
  h += `</div>`;
  return h;
}

// ── Prompt ──
function updatePrompt() {
  const parts = [];
  parts.push(`Add an AI Transformation Roadmap section to the results page in /Users/dimakhan/Atlas Landing/le/components/QuizPage.tsx:`);
  parts.push('');
  parts.push(`Layout: ${state.layout === 'gantt' ? 'Gantt-style horizontal swim lanes — left column for phase info, right for milestones' : state.layout === 'cards' ? 'Stacked full-width cards with 2-column milestone grid' : 'Vertical journey map with connected timeline nodes and milestone dots'}`);

  if (state.headerStyle !== 'hero') {
    parts.push(`Header: ${state.headerStyle === 'compact' ? 'compact inline with phase badges' : 'hidden'}`);
  }
  if (state.colorScheme !== 'orange-gradient') {
    const m = {'domain-colors':'domain colors (indigo/blue/purple/green)','status-colors':'status progression (red→orange→yellow→green)','monochrome':'monochrome grayscale'};
    parts.push(`Phase colors: ${m[state.colorScheme]}`);
  }
  parts.push('');
  parts.push('Phases:');
  parts.push('  1. Days 1-14: Full AI Diagnostics (interviews, process mapping, opportunity sizing, deliver dashboard)');
  parts.push('  2. Days 15-60: Launch & Quick Wins (AI Office, Change Management 4 quadrants, enterprise AI access, 3-5 pilots, playbooks)');
  parts.push('  3. Q3 2026: Scale & Automate (expand pilots, always-on agents, automated pipelines, knowledge layer, ROI review)');
  parts.push('  4. Q4 2026: Optimize & Compound (AI-native ops, multi-agent orchestration, AI in HR, knowledge compounding, full ROI)');

  if (!state.showImpact) parts.push('\n- Hide expected impact text per phase');
  if (!state.showDeliverables) parts.push('- Hide deliverable tags');
  if (!state.showMilestones) parts.push('- Hide milestone list');
  if (state.showWeeks) parts.push('- Show week/month markers per milestone');
  if (!state.showCTA) parts.push('- Hide CTA banner');
  if (state.showCTA) parts.push('\nCTA: "Discuss Your Roadmap with Codos" → Google Calendar booking link');
  if (state.radius !== 16) parts.push(`\nBorder radius: ${state.radius}px`);

  document.getElementById('prompt-text').textContent = parts.join('\n');
}

function copyPrompt() {
  navigator.clipboard.writeText(document.getElementById('prompt-text').textContent).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!'; btn.style.color = '#4ade80'; btn.style.borderColor = '#4ade80';
    setTimeout(() => { btn.textContent = 'Copy'; btn.style.color = ''; btn.style.borderColor = ''; }, 1500);
  });
}

function updateAll() {
  document.getElementById('val-radius').textContent = state.radius;
  document.getElementById('val-gap').textContent = state.gap;
  renderPreview();
  updatePrompt();
}

syncControls();
updateAll();
</script>
